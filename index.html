<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>神の託宣</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      overflow: hidden;
    }
    
    /* 130人のiPhoneで100%全画面に完璧にフィットさせる設定 */
    .fullscreen-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('gate02.png'); /* あなたの美しい画像ファイル名 */
      background-size: cover;
      background-position: center;
      opacity: 0;
      /* 2秒かけて神々しくフワァーっと浮かび上がらせます */
      animation: divineFadeIn 2.0s ease-out forwards;
    }

    @keyframes divineFadeIn {
      0% {
        opacity: 0;
        filter: blur(5px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }
  </style>
  <script>
    window.onload = function() {
      // 1. URLから「?choice=A」などの投票データを自動で読み取る
      const urlParams = new URLSearchParams(window.location.search);
      const choice = urlParams.get('choice');
      
      if (choice) {
        // 👇 あなたのGASのURLをあらかじめ組み込みました！
        const myGasUrl = "https://script.google.com/macros/s/AKfycbwDOwTOpEmEm4P8PFVpsbmEJv43ydMvJ6ZBvlcxClWavo3FcbumDdz6sb1i1KyuSjVRNg/exec";
        
        // 2. 自動で「?choice=A」の形に組み立てて、お客様の画面の裏側（背景）でGASに1票を爆速で送信する
        const gasUrl = myGasUrl + "?choice=" + encodeURIComponent(choice);
        navigator.sendBeacon(gasUrl);
      }
    };
  </script>
</head>
<body>
  <div class="fullscreen-bg"></div>
</body>
</html>
