<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>神の託宣</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; overflow: hidden; }
    .fullscreen-bg {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: url('gate02.png'); background-size: cover; background-position: center;
      opacity: 0; animation: divineFadeIn 2.0s ease-out forwards;
    }
    @keyframes divineFadeIn { 0% { opacity: 0; filter: blur(5px); } 100% { opacity: 1; filter: blur(0); } }
  </style>
  <script>
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const choice = urlParams.get('choice');
      if (choice) {
        // ★ここに、さっきステップ2の最後にコピーした【あなたの最新のGASのURL】を上書きで貼り付けてください。
        const myGasUrl = "https://script.google.com/macros/s/AKfycbwKOXx-7pigyzR4otdwyblwSrRdNlY5cSIyIGEFDFgOU-8hXMOyauDSszb1WopsBm34/exec";
        
        const cacheBuster = "&t=" + new Date().getTime();
        const img = new Image();
        img.src = myGasUrl + "?choice=" + encodeURIComponent(choice) + cacheBuster;
      }
    };
  </script>
</head>
<body>
  <div class="fullscreen-bg"></div>
</body>
</html>
